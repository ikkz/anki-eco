name: Classic Dist

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.4.27'

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bunx nx output classic-templates
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy templates/classic/output --project-name=classic-dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
