name: Classic Dist

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/classic-dist.yml'
      - 'templates/classic/**'
      - 'packages/analytics/**'
      - 'packages/kit/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'bun.lock'
      - 'nx.json'

jobs:
  build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.4.27'

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bunx nx output classic-templates
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy templates/classic/output --project-name=classic-dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  pr-en-native-artifact:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.4.27'

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build Classic en native templates
        run: |
          rm -rf templates/classic/output
          bun run --filter @anki-eco/classic-templates build -- --locale=en --field=native
          bun run --filter @anki-eco/classic-templates package

      - name: Upload Classic en native templates
        uses: actions/upload-artifact@v4
        with:
          name: classic-templates-en-native
          path: templates/classic/output/release/*.apkg
          if-no-files-found: error
