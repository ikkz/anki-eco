<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="../dist/index.css" />
  </head>
  <body>
    <!-- Basic usage -->
    <div class="prose">{{FieldName}}</div>

    <!-- Always use larger font size -->
    <div class="prose prose-xl">{{FieldName}}</div>

    <!-- Larger font size for larger screen -->
    <div class="prose lg:prose-xl">{{FieldName}}</div>

    <!-- Adapting to dark mode -->
    <div class="prose dark:prose-invert">{{FieldName}}</div>
  </body>
</html>
